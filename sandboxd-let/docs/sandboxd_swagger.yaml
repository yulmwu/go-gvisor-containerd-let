basePath: /
definitions:
  httpserver.ContainerLogsResponse:
    properties:
      container:
        type: string      logs:
        $ref: '#/definitions/sandbox.LogsPage'
      sandbox_id:
        type: string
    type: object
  httpserver.CreateSandboxResponse:
    properties:      sandbox:
        $ref: '#/definitions/model.Sandbox'
    type: object
  httpserver.DeleteSandboxResponse:
    properties:      id:
        type: string
      phase:
        type: string
    type: object
  httpserver.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  httpserver.GetSandboxResponse:
    properties:      sandbox:
        $ref: '#/definitions/model.Sandbox'
    type: object
  httpserver.HealthResponse:
    properties:
      ok:
        type: boolean
    type: object
  httpserver.ListSandboxesResponse:
    properties:      items:
        items:
          $ref: '#/definitions/model.Sandbox'
        type: array
      next_cursor:
        type: string
    type: object
  httpserver.NodeStatusResponse:
    properties:
      ok:
        type: boolean
      resources:
