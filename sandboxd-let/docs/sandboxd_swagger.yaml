info:
  contact: {}
  description: Sandbox node agent API for gVisor-based sandbox lifecycle, runtime
    status, logs, and reconcile operations.
  title: Sandboxd API
  version: "1.0"
paths:
  /healthz:
    get:
      description: Returns service health.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpserver.HealthResponse'
      summary: Health check
      tags:
      - sandboxd-node
  /v1/node/status:
    get:
      description: Returns unified node resource status used by orchestrator heartbeats
        and scheduling.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpserver.NodeStatusResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpserver.ErrorResponse'
      summary: Get node resource snapshot
      tags:
      - sandboxd-node
  /v1/reconcile:
    post:
      description: Triggers one reconcile pass for orphan/runtime consistency cleanup.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpserver.ReconcileResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpserver.ErrorResponse'
      summary: Trigger reconcile
      tags:
      - sandboxd-maintenance
  /v1/sandboxes:
    get:
      description: Lists sandboxes with cursor-based pagination.
      parameters:
      - description: Pagination cursor
        in: query
        name: cursor
        type: string
      - description: Page size (default 20)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpserver.ListSandboxesResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpserver.ErrorResponse'
      summary: List sandboxes
      tags:
      - sandboxd-sandbox
    post:
      consumes:
      - application/json
      description: Validates request, persists state, and starts asynchronous provisioning
        using CRI + runsc(gVisor).
      parameters:
      - description: Create sandbox request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.CreateSandboxRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/httpserver.CreateSandboxResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpserver.ErrorResponse'
      summary: Create sandbox (async)
      tags:
      - sandboxd-sandbox
  /v1/sandboxes/{id}:
    delete:
      description: Deletes sandbox runtime artifacts and persisted state.
      parameters:
      - description: Sandbox ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpserver.DeleteSandboxResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpserver.ErrorResponse'
      summary: Delete sandbox
      tags:
      - sandboxd-sandbox
    get:
      description: Returns current sandbox state, including phase and container runtime
        status.
      parameters:
      - description: Sandbox ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpserver.GetSandboxResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpserver.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpserver.ErrorResponse'
      summary: Get sandbox
      tags:
      - sandboxd-sandbox
  /v1/sandboxes/{id}/containers/{name}/logs:
    get:
      description: Reads container logs with cursor pagination over byte offsets.
      parameters:
      - description: Sandbox ID
        in: path
        name: id
        required: true
        type: string
      - description: Container name
        in: path
        name: name
        required: true
        type: string
      - description: Cursor offset
        in: query
        name: cursor
        type: string
      - description: Max lines (default 100)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpserver.ContainerLogsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpserver.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpserver.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpserver.ErrorResponse'
      summary: Get container logs
      tags:
      - sandboxd-logs
schemes:
- http
swagger: "2.0"
